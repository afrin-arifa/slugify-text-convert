<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slug Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #919191;
        }

        .wrapper {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        input {
            width: 94%;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 16px;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #f3847c;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 8px;
        }

        .output {
            margin-top: 15px;
        }

        .output input {
            background: #f1f1f1;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn-group button {
            flex: 1;
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <input type="text" id="textInput" placeholder="Enter text">

        <div class="btn-group">
            <button onclick="generateSlug()">Generate</button>
            <button onclick="refreshAll()">Refresh</button>
        </div>

        <div class="output">
            <input type="text" id="result" readonly placeholder="Slug will appear here">
            <button onclick="copySlug()">Copy</button>
        </div>
    </div>

    <script>
        function generateSlug() {
            let text = document.getElementById("textInput").value;

            let slug = text
                .replace(/&/g, " and ")
                .toLowerCase()
                .trim()
                .replace(/[^a-z0-9\s-]/g, "")
                .replace(/\s+/g, "-")
                .replace(/-+/g, "-");

            document.getElementById("result").value = slug;
        }

        function copySlug() {
            let result = document.getElementById("result");
            result.select();
            result.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(result.value);
        }

        function refreshAll() {
            document.getElementById("textInput").value = "";
            document.getElementById("result").value = "";
        }
    </script>

</body>

</html>
